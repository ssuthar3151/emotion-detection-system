<!DOCTYPE html>  
<html lang="en">  
<head>  
    <meta charset="UTF-8">  
    <meta name="viewport" content="width=device-width, initial-scale=1.0">  
    <title>Real-Time Emotion Detection</title>  
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tensorflow/2.8.6/tf.min.js"></script>  
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-core@2.8.6/dist/tf.min.js"></script>  
    <script defer src="https://cdn.jsdelivr.net/npm/face-api.js"></script>  
    <style>  
        body {  
            display: flex;  
            flex-direction: column;  
            align-items: center;  
            justify-content: center;  
            height: 100vh;  
            background-color: #f0f0f0;  
            font-family: Arial, sans-serif;  
        }  
        video {  
            border: 1px solid #ccc;  
            width: 60%;  
            max-width: 640px;  
        }  
        #status {  
            margin-top: 20px;  
            font-size: 24px;  
        }  
    </style>  
</head>  
<body>  
    <h1>Real-Time Emotion Detection</h1>  
    <video id="video" autoplay muted></video>  
    <div id="status">Loading models...</div>  
    <script>  
        const video = document.getElementById('video');  
        async function setupCamera() {  
            const stream = await navigator.mediaDevices.getUserMedia({ video: {} });  
            video.srcObject = stream;  
            return new Promise((resolve) => {  
                video.onloadedmetadata = () => {  
                    resolve(video);  
                };  
            });  
        }  

        async function loadModels() {  
            await faceapi.nets.ssdMobilenetv1.loadFromUri('/models');  
            await faceapi.nets.faceExpressionNet.loadFromUri('/models');  
            document.getElementById('status').innerText = 'Models loaded!';  
        }  

        async function detectFaceExpressions() {  
            const detections = await faceapi.detectAllFaces(video).withFaceExpressions();  
            if (detections.length > 0) {  
                const emotions = detections[0].expressions;  
                const highestEmotion = Object.keys(emotions).reduce((a, b) => emotions[a] > emotions[b] ? a : b);  
                const status = `${highestEmotion.charAt(0).toUpperCase() + highestEmotion.slice(1)} detected!`;  
                document.getElementById('status').innerText = status;  
            } else {  
                document.getElementById('status').innerText = 'No face detected!';  
            }  
            requestAnimationFrame(detectFaceExpressions);  
        }  

        async function run() {  
            await setupCamera();  
            await loadModels();  
            video.play();  
            detectFaceExpressions();  
        }  

        run();  
    </script>  
</body>  
</html>
